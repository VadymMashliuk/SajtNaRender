<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css">
    <title>Live Counter</title>
</head>
<body>
<div class="row row-cols-1 row-cols-md-3 g-4">
    Оновлення даних в реальному часі
  <div class="col">
    <div class="card h-100">
        Північна Америка
        <b id="naselennaPivnicnojiAmeryky">617300000</b>
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Південна Америка
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Європа
        <b id="naselennaJevropy">732800000</b>
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Азія
        <b id="naselennaAziji">4342300000</b>
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Африка
        <b id="naselennaAfryky">1216100000</b>
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Океанія
    </div>
  </div>
</div>
    <h2 id="number" class="container">0</h2>
    <script src="https://cdn.socket.io/4.7.5/socket.io.js"></script>
    <script>
        const socket = io();
        const number = document.getElementById("number");

        socket.on("counterUpdate", (value) => {
            number.textContent = value;
        });

        const naselennaPivnicnojiAmeryky = document.getElementById("naselennaPivnicnojiAmeryky");
        socket.on("zbilsennaNaselennaPivnicnojiAmeryky", (value) =>
        {
            naselennaPivnicnojiAmeryky.textContent = value;
        });
        socket.on("zmensennaNaselennaPivnicnojiAmeryky", (value) =>
        {
            naselennaPivnicnojiAmeryky.textContent = value;
        });
        const naselennaJevropy = document.getElementById("naselennaJevropy");
        socket.on("zbilsennaNaselennaJevropy", (value) =>
        {
            naselennaJevropy.textContent = value;
        });
        socket.on("zmensennaNaselennaJevropy", (value) =>
        {
            naselennaJevropy.textContent = value;
        });
        const naselennaAziji = document.getElementById("naselennaAziji");
        socket.on("zbilsennaNaselennaAziji", (value) =>
        {
            naselennaAziji.textContent = value;
        });
        socket.on("zmensennaNaselennaAziji", (value) =>
        {
            naselennaAziji.textContent = value;
        });
        const naselennaAfryky = document.getElementById("naselennaAfryky");
        socket.on("zbilsennaNaselennaAfryky", (value) =>
        {
            naselennaAfryky.textContent = value;
        });
        socket.on("zmensennaNaselennaAfryky", (value) =>
        {
            naselennaAfryky.textContent = value;
        });
        
    </script>
</body>
</html>
