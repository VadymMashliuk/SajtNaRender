<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css">
    <title>Live Counter</title>
</head>
<body>
<div class="row row-cols-1 row-cols-md-3 g-4">
  <div class="col">
    <div class="card h-100">
        Північна Америка
        <p></p>
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Південна Америка
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Європа
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Азія
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Африка
        <br>Оновлення даних кожних 8 секунд
        <p id="naselennaAfryky">1216100000</p>
    </div>
  </div>
  <div class="col">
    <div class="card h-100">
        Океанія
    </div>
  </div>
</div>
    <h2 id="number" class="container">0</h2>
    <script src="https://cdn.socket.io/4.7.5/socket.io.js"></script>
    <script>
        const socket = io();
        const number = document.getElementById("number");

        socket.on("counterUpdate", (value) => {
            number.textContent = value;
        });

        const naselennaAfryky = document.getElementById("naselennaAfryky");
        socket.on("zbilsennaNaselennaAfryky", (value) => {
            naselennaAfryky.textContent = value;
        });
        socket.on("zmensennaNaselennaAfryky", (value) => {
            naselennaAfryky.textContent = value;
        });
    </script>
</body>
</html>
